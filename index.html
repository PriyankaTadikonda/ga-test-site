<body>
  <h1>Test Site</h1>

  <!-- CTA Button -->
  <button id="go_to_page1">Go To Page 1</button>

  <script>
    document.getElementById("go_to_page1").addEventListener("click", function () {
      var linkId = "go_to_page1";
      var linkName = "Go To Page 1";

      // dataLayer push
      dataLayer.push({
        event: "link_click",
        website_name: "GA Test Site",
        link_id: linkId,
        link_name: linkName,
        fpid: currentFPID,
        crmid: currentCRMID,
        priya_ingestion_source: currentIngestionSource
      });

      // GA event
      sendGAEvent('button_click', {
        event_category: 'engagement',
        event_label: linkName,
        link_id: linkId,
        link_name: linkName
      });

      // Redirect after slight delay (ensures tracking fires)
      setTimeout(function () {
        window.location.href = "https://page1.priya-demo.com/";
      }, 300);
    });
  </script>
</body>
